<!doctype html>
<html lang="ja">
<head>
<title>ページが見つかりません (404) | 青空文庫</title>
<meta charset="utf-8">
<meta name="viewport" content="initial-scale=1, width=device-width">
<meta name="robots" content="noindex, nofollow">
<style>
*, *::before, *::after { box-sizing: border-box; }
* { margin: 0; }
html { font-size: 16px; }
body {
  background: #f0f9ff;
  color: #1e293b;
  display: grid;
  font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP", ui-sans-serif, system-ui, sans-serif;
  font-size: clamp(1rem, 2.5vw, 1.5rem);
  -webkit-font-smoothing: antialiased;
  line-height: 1.6;
  min-height: 100vh;
  place-items: center;
}
a { color: #0369a1; text-decoration: underline; }
a:hover { color: #0284c7; }
main {
  display: grid;
  gap: 1.5em;
  padding: 2em;
  place-items: center;
  text-align: center;
  max-width: 40em;
}
h1 {
  font-size: 3em;
  font-weight: 700;
  color: #0284c7;
  line-height: 1.2;
}
p { font-size: 0.9em; color: #475569; }
.home-link {
  display: inline-block;
  margin-top: 0.5em;
  padding: 0.5em 1.5em;
  background: #0284c7;
  color: #fff;
  text-decoration: none;
  border-radius: 0.375em;
  font-size: 0.85em;
}
.home-link:hover { background: #0369a1; color: #fff; }
</style>
</head>
<body>
<main>
  <h1>404</h1>
  <p><strong>お探しのページは見つかりませんでした。</strong></p>
  <p>URLが正しいかご確認ください。ページが移動または削除された可能性があります。</p>
  <a class="home-link" href="/">青空文庫トップページへ</a>
</main>
</body>
</html>
